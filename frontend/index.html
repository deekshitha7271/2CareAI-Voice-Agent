<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2Care AI Assistant</title>
  <style>
    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center 20%, #1e293b 0%, #0f172a 100%);
      font-family: system-ui, sans-serif;
      color: white;
    }

    .stethoscope {
      width: 120px;
      height: 120px;
      stroke: #06B6D4;
      stroke-width: 4;
      fill: none;
      filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.5));
    }

    .path-beat {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: heartbeat 2.5s linear infinite;
    }

    @keyframes heartbeat {
      0% {
        stroke-dashoffset: 1000;
      }

      50% {
        stroke-dashoffset: 0;
      }

      100% {
        stroke-dashoffset: 1000;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="loader-wrapper">
      <svg viewBox="0 0 24 24" class="stethoscope path-beat">
        <path d="M19 4v3a7 7 0 0 1-14 0V4M12 11v8M9 21h6" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="12" cy="18" r="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <div style="margin-top: 24px; font-weight: 300; letter-spacing: 2px; color: #94A3B8;">INITIALIZING 2CARE AI...
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
